<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="forgeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F7931E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD23F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="forgeGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#forgeGradient)" filter="url(#glow)" />
  
  <!-- Inner glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#forgeGlow)" stroke-width="4" />
  
  <!-- Anvil shape (the core symbol) -->
  <g transform="translate(256, 256) scale(1.2)">
    <!-- Anvil base -->
    <path d="M-60 20 L60 20 L50 40 L-50 40 Z" fill="#1A1A2E" stroke="#FF6B35" stroke-width="2" />
    <!-- Anvil horn -->
    <path d="M-60 20 L-80 -30 L-70 -30 L-50 20 Z" fill="#2D2D44" stroke="#FF6B35" stroke-width="2" />
    <!-- Anvil face/top -->
    <path d="M-80 -30 L80 -30 L70 -50 L-70 -50 Z" fill="#1A1A2E" stroke="#FF6B35" stroke-width="2" />
    <!-- Anvil heel -->
    <path d="M50 20 L80 -30 L70 -30 L50 40 Z" fill="#2D2D44" stroke="#FF6B35" stroke-width="2" />
    
    <!-- Hammer striking -->
    <path d="M-40 -100 L-20 -100 L-20 -60 L-40 -60 Z" fill="#C0C0C0" stroke="#888" stroke-width="1.5" transform="rotate(-30 -30 -80)" />
    <path d="M-50 -100 L-10 -100 L-15 -115 L-45 -115 Z" fill="#4A4A5A" transform="rotate(-30 -30 -80)" />
    
    <!-- Spark particles -->
    <circle cx="55" cy="-25" r="3" fill="#FFD23F" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0;0.9" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;1;3" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="65" cy="-15" r="2" fill="#FF6B35" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="50" cy="-35" r="2.5" fill="#F7931E" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- FORGE text -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="48" fill="#FFFFFF" stroke="#1A1A2E" stroke-width="2" paint-order="stroke fill">
    FORGE
  </text>
</svg>