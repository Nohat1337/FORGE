name: Forge CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libsdl2-dev

    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: |
        cd build
        make -j$(nproc)

    - name: Test interpreter
      run: |
        cd build
        ./forge ../examples/test_all.fge
        ./forge ../examples/simple.fge

    - name: Test compile and run
      run: |
        cd build
        ./forgevm compile ../examples/test_all.fge /tmp/test_all.fclass
        ./forgevm /tmp/test_all.fclass
        ./forgevm compile ../examples/simple.fge /tmp/simple.fclass
        ./forgevm /tmp/simple.fclass

    - name: Test tools exist
      run: |
        cd build
        test -x tools/forge-format
        test -x tools/forge-lint

  build-macos:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install sdl2 cmake

    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Test interpreter
      run: |
        cd build
        ./forge ../examples/test_all.fge
        ./forge ../examples/simple.fge

    - name: Test compile and run
      run: |
        cd build
        ./forgevm compile ../examples/test_all.fge /tmp/test_all.fclass
        ./forgevm /tmp/test_all.fclass

  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System'
        choco install sdl2

    - name: Build
      shell: cmd
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022" -A x64
        cmake --build . --config Release

    - name: Test interpreter
      shell: cmd
      run: |
        cd build
        Release\forge.exe ..\examples\test_all.fge
        Release\forge.exe ..\examples\simple.fge

    - name: Test compile and run
      shell: cmd
      run: |
        cd build
        Release\forgevm.exe compile ..\examples\test_all.fge C:\tmp\test_all.fclass
        Release\forgevm.exe C:\tmp\test_all.fclass
